  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Georgia,'Times New Roman',serif;background:#f5f4f0;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .lock{background:white;border-radius:14px;padding:3rem 2.5rem;text-align:center;max-width:380px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,0.10);border:0.5px solid rgba(0,0,0,0.10);position:relative;}

    h1{font-size:28px;font-weight:normal;color:#1a1916;margin-bottom:0.25rem;}
    p{font-size:13px;color:#9a958e;margin-bottom:2rem;font-family:Arial,sans-serif;}
    input{width:100%;border:0.5px solid rgba(0,0,0,0.18);border-radius:8px;padding:12px 14px;font-size:16px;font-family:Georgia,serif;color:#1a1916;background:#f5f4f0;text-align:center;letter-spacing:0.1em;margin-bottom:12px;}
    input:focus{outline:none;border-color:#C8A84B;}
    button{width:100%;padding:12px;background:#8B6914;color:white;border:none;border-radius:8px;font-size:14px;font-family:Arial,sans-serif;cursor:pointer;}
    button:hover{background:#6a4e0a;}
    .error{font-size:13px;color:#993C1D;font-family:Arial,sans-serif;margin-top:10px;display:none;}
  </style>
